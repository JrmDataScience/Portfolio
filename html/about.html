<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Jherome Pontawe</title>
    <link rel="stylesheet" href="../style/about.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="logo">
        <img src="../img/logo.png" alt="JRM logo" />
    </div>
    <header class="topbar">
        <nav class="nav-links" aria-label="Main navigation">
            <a href="home.html">Home</a>
            <a class="active" href="about.html">Contact</a>
            <a href="skills.html">Skills</a>
            <a href="projects.html">Projects</a>
        </nav>
    </header>

    <main class="contact-layout">
        <section class="contact-copy" aria-labelledby="contact-heading">
            <div class="dot-grid" aria-hidden="true"></div>
            <p class="eyebrow">Get in Touch</p>
            <h1 id="contact-heading">Let's Work <span>Together</span></h1>
            <div class="accent-line" aria-hidden="true"></div>
            <p class="intro-text">
                I'm always open to discussing new projects, creative ideas, or opportunities to turn data into useful decisions. Feel free to reach out.
            </p>
        </section>

        <section class="form-panel" aria-labelledby="form-heading">
            <div class="panel-dots" aria-hidden="true"></div>
            <div class="form-wrap">
                <h2 id="form-heading">Get in Touch</h2>
                <div class="form-line" aria-hidden="true"></div>
                <form class="contact-form" autocomplete="off">
                    <div class="form-row">
                        <label>
                            <span>Your Name</span>
                            <input type="text" name="name" placeholder="Your Name" required />
                        </label>
                        <label>
                            <span>Your Email</span>
                            <input type="email" name="email" placeholder="Your Email" required />
                        </label>
                    </div>
                    <label>
                        <span>Subject</span>
                        <input type="text" name="subject" placeholder="Subject" required />
                    </label>
                    <label>
                        <span>Your Message</span>
                        <textarea name="message" rows="7" placeholder="Your Message" required></textarea>
                    </label>
                    <button type="submit">Send Message <span aria-hidden="true">-></span></button>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
